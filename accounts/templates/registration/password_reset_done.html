{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check Your Email - Pawmily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/3c4772942f.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="{% static 'css/system.css' %}">
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <a href="/" class="login-card__brand">
        <span class="login-card__brand-icon">
          <i class="fa-solid fa-paw"></i>
        </span>
        <span class="login-card__brand-name">PAWMILY</span>
      </a>

      <h1 class="login-card__title">Check your email</h1>
      <p class="login-card__sub">
        If the email exists in our system, a password reset link has been sent.
      </p>

      <p class="login-card__sub" style="margin-bottom: 0.75rem;">
        The link expires in 24 hours for your security.
      </p>

      <p class="login-card__register">
        <a href="{% url 'login' %}">Back to sign in</a>
      </p>
    </div>
  </div>

</body>
</html>
